<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Progress and Status</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0c1c31;
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.14);
      --text: #eef5ff;
      --muted: #9fb3ca;
      --soft: #dbe7f6;
      --shadow: 0 24px 60px rgba(0,0,0,0.34);
      --team-primary: #111d45;
      --team-secondary: #0a1430;
      --team-accent: #ffffff;
      --team-accent-2: #b9cae7;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(118, 155, 255, 0.16), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255, 214, 111, 0.08), transparent 20%),
        linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
      padding: 10px;
    }

    .app {
      max-width: 1440px;
      margin: 0 auto;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(8,16,28,0.95), rgba(9,17,29,0.98));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .shell {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .card {
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(17,29,48,0.92), rgba(9,18,30,0.98));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      min-width: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: linear-gradient(180deg, rgba(8,16,28,0.92), rgba(8,16,28,0.72));
      border-radius: 20px;
      padding: 10px;
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: start;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-logo-wrap {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .brand-logo-wrap img {
      width: 78%;
      height: 78%;
      object-fit: contain;
    }

    .brand-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #07111f;
      background: linear-gradient(135deg, var(--team-accent-2), var(--team-accent));
    }

    .brand-copy { min-width: 0; }

    .brand-copy h1 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .brand-copy p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font: inherit;
    }

    .icon-btn:hover { border-color: var(--line-strong); }

    .updated-label {
      font-size: 0.75rem;
      font-style: italic;
      color: var(--muted);
      text-align: right;
    }

    .menu-wrap { position: relative; }

    .menu-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: min(280px, calc(100vw - 36px));
      padding: 10px;
      border-radius: 18px;
      border: 1px solid var(--line-strong);
      background: rgba(10,18,31,0.98);
      box-shadow: 0 22px 60px rgba(0,0,0,0.38);
      display: none;
    }

    .menu-panel.open { display: block; }

    .menu-label {
      font-size: 0.74rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin: 4px 4px 10px;
    }

    .team-list { display: grid; gap: 8px; }

    .team-option {
      width: 100%;
      text-align: left;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--soft);
      cursor: pointer;
      display: grid;
      gap: 4px;
    }

    .team-option strong { color: #fff; font-size: 0.96rem; }
    .team-option span { color: var(--muted); font-size: 0.8rem; }

    .team-option.active {
      background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      border-color: rgba(255,255,255,0.16);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px 14px 20px;
      background:
        linear-gradient(180deg, rgba(6,10,16,0.92), rgba(8,12,18,0.98)),
        linear-gradient(135deg, var(--team-primary), var(--team-secondary));
      min-height: 260px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.55) 35%, rgba(0,0,0,0.55) 65%, rgba(0,0,0,0.82) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .hero-art {
      position: absolute;
      inset: 0;
      background-image: var(--hero-art, none);
      background-position: center;
      background-repeat: no-repeat;
      background-size: 40%;
      opacity: 0.08;
      z-index: 0;
      pointer-events: none;
    }

    .hero-stage {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 18px;
      align-content: center;
      min-height: 220px;
    }

    .hero-headline {
      text-align: center;
      color: rgba(255,255,255,0.78);
      font-size: 0.95rem;
    }

    .hero-match {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 18px;
    }

    .hero-side {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      min-width: 0;
    }

    .hero-side.away { justify-content: flex-start; }

    .hero-team {
      font-size: clamp(1.15rem, 2.5vw, 2.15rem);
      line-height: 1.06;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hero-crest-wrap {
      width: clamp(56px, 6vw, 84px);
      height: clamp(56px, 6vw, 84px);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .hero-crest-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .hero-crest-fallback {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #07111f;
      background: linear-gradient(135deg, var(--team-accent-2), var(--team-accent));
    }

    .hero-middle {
      min-width: 170px;
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .hero-core {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 86px;
    }

    .hero-kickoff-time,
    .hero-score-big {
      font-size: clamp(3rem, 7vw, 4.4rem);
      line-height: 0.95;
      font-weight: 400;
      color: #fff;
      letter-spacing: -0.04em;
    }

    .hero-score-divider {
      width: 3px;
      height: clamp(38px, 7vw, 56px);
      border-radius: 999px;
      background: var(--team-accent);
      opacity: 0.92;
    }

    .hero-status {
      color: var(--team-accent);
      font-size: 0.92rem;
      font-weight: 700;
      min-height: 1.2em;
    }

    .hero-subdetail {
      text-align: center;
      color: rgba(255,255,255,0.78);
      font-size: 0.95rem;
      line-height: 1.4;
      min-height: 1.4em;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card { padding: 14px; }

    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1;
    }

    .stat-sub {
      margin-top: 8px;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .nav-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .nav-row::-webkit-scrollbar { display: none; }

    .nav-btn {
      white-space: nowrap;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--soft);
      border-radius: 14px;
      padding: 11px 13px;
      font: inherit;
      cursor: pointer;
    }

    .nav-btn.active {
      background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      border-color: rgba(255,255,255,0.16);
      color: #fff;
    }

    .content-grid { display: grid; gap: 12px; }
    .panel { padding: 14px; }
    .panel[hidden] { display: none !important; }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 1rem;
    }

    .subtle {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .match-list,
    .news-list {
      display: grid;
      gap: 10px;
    }

    .match-item,
    .news-item {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--line);
    }

    .match-item {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 12px;
    }

    .date-box {
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      padding: 10px 8px;
      text-align: center;
      color: var(--soft);
      line-height: 1.12;
    }

    .date-box strong {
      display: block;
      font-size: 1.08rem;
      color: #fff;
      margin-bottom: 4px;
    }

    .match-main { min-width: 0; }

    .match-competition {
      font-size: 0.73rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .teams { display: grid; gap: 5px; }

    .team-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .team-name {
      min-width: 0;
      color: #fff;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-score {
      font-weight: 900;
      color: var(--team-accent);
      flex: 0 0 auto;
    }

    .match-side {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 0.82rem;
      flex-wrap: wrap;
    }

    .result-link {
      margin-top: 10px;
      display: inline-flex;
      color: var(--team-accent);
      font-size: 0.84rem;
      font-weight: 700;
      text-decoration: none;
    }

    .result-link:hover { text-decoration: underline; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 800;
      color: #fff;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
    }

    .status-live { background: rgba(255,90,110,0.16); border-color: rgba(255,90,110,0.24); }
    .status-upcoming { background: rgba(98,214,163,0.12); border-color: rgba(98,214,163,0.18); }
    .status-finished { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 560px; border-collapse: collapse; }

    th, td {
      text-align: left;
      padding: 12px 10px;
    }

    th {
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    td {
      border-top: 1px solid var(--line);
      color: var(--soft);
      font-size: 0.9rem;
    }

    tr.active-row td {
      background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent);
    }

    .team-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .team-logo {
      width: 26px;
      height: 26px;
      object-fit: contain;
      border-radius: 9px;
      background: rgba(255,255,255,0.06);
      padding: 2px;
      flex: 0 0 auto;
    }

    .news-item {
      padding: 0;
      overflow: hidden;
    }

    .news-inner {
      display: grid;
      grid-template-columns: 124px 1fr;
      gap: 0;
      min-height: 100%;
    }

    .news-thumb {
      width: 124px;
      height: 100%;
      min-height: 104px;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.05);
    }

    .news-content {
      padding: 12px;
      min-width: 0;
    }

    .news-title {
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .news-item a {
      color: #fff;
      text-decoration: none;
    }

    .news-item a:hover { text-decoration: underline; }

    .news-meta {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .empty {
      padding: 18px;
      border-radius: 16px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.10);
    }

    @media (min-width: 760px) {
      body { padding: 16px; }
      .shell { padding: 18px; gap: 18px; }
      .topbar { padding: 12px 14px; }
      .brand-copy h1 { font-size: 1.2rem; }
      .brand-copy p { font-size: 0.85rem; }
      .hero { padding: 24px 20px 24px; min-height: 310px; }
      .stats-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .content-grid { grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr); gap: 18px; }
    }

    @media (max-width: 759px) {
      .brand { min-width: 0; gap: 8px; }
      .brand-logo-wrap { width: 40px; height: 40px; }
      .brand-copy h1 { font-size: 0.9rem; }
      .brand-copy p {
        font-size: 0.72rem;
        white-space: normal;
        line-height: 1.2;
      }
      .updated-label { font-size: 0.72rem; }
      .hero {
        padding: 18px 12px 20px;
        min-height: 250px;
      }
      .hero-match {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .hero-side,
      .hero-side.away {
        justify-content: center;
        gap: 12px;
      }
      .hero-side.home { flex-direction: row; }
      .hero-side.away { flex-direction: row-reverse; }
      .hero-team {
        font-size: clamp(1rem, 5.2vw, 1.45rem);
        white-space: normal;
        text-align: center;
        max-width: 150px;
      }
      .hero-crest-wrap { width: 50px; height: 50px; }
      .hero-middle { min-width: 0; gap: 8px; }
      .hero-core { min-height: 64px; gap: 12px; }
      .hero-kickoff-time,
      .hero-score-big { font-size: clamp(2.3rem, 12vw, 3.3rem); }
      .hero-score-divider { height: 38px; }
      .hero-headline { font-size: 0.88rem; }
      .hero-status { font-size: 0.84rem; }
      .hero-subdetail { font-size: 0.86rem; }
      .news-inner { grid-template-columns: 1fr; }
      .news-thumb {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <div class="brand-logo-wrap">
              <div class="brand-fallback" id="brandFallback">FC</div>
              <img id="brandLogo" alt="" hidden />
            </div>
            <div class="brand-copy">
              <h1>Football Progress and Status</h1>
              <p id="brandSubtitle">Tottenham + AFC Wimbledon</p>
            </div>
          </div>

          <div></div>

          <div class="top-actions">
            <div class="menu-wrap">
              <button class="icon-btn" id="menuButton" aria-label="Open menu" aria-expanded="false">☰</button>
              <div class="menu-panel" id="menuPanel">
                <div class="menu-label">Select team</div>
                <div class="team-list" id="teamToggle"></div>
              </div>
            </div>
            <div class="updated-label" id="updatedLabel">Updated just now</div>
          </div>
        </div>
      </header>

      <section class="hero card">
        <div class="hero-art" id="heroArt"></div>
        <div class="hero-stage">
          <div class="hero-headline" id="heroEyebrow">Loading latest football data</div>
          <div class="hero-match" id="heroMatch">
            <div class="empty">Loading match centre…</div>
          </div>
          <div class="hero-subdetail" id="heroSubdetail">Waiting for match data…</div>
        </div>
      </section>

      <section class="stats-row">
        <div class="stat-card card">
          <div class="stat-label">League position</div>
          <div class="stat-value" id="statPosition">–</div>
          <div class="stat-sub" id="statPositionSub">–</div>
        </div>

        <div class="stat-card card">
          <div class="stat-label">Points</div>
          <div class="stat-value" id="statPoints">–</div>
          <div class="stat-sub" id="statPointsSub">–</div>
        </div>
      </section>

      <nav class="nav-row" id="navRow">
        <button class="nav-btn active" data-panel="fixturesPanelCard">Fixtures</button>
        <button class="nav-btn" data-panel="resultsPanelCard">Results</button>
        <button class="nav-btn" data-panel="tablePanelCard">Table</button>
        <button class="nav-btn" data-panel="newsPanelCard">News</button>
      </nav>

      <section class="content-grid">
        <section class="panel card" id="fixturesPanelCard">
          <div class="panel-head">
            <h3>Fixtures</h3>
            <div class="subtle" id="fixturesSubtle">Loading…</div>
          </div>
          <div class="match-list" id="fixturesPanel"></div>
        </section>

        <section class="panel card" id="resultsPanelCard" hidden>
          <div class="panel-head">
            <h3>Results</h3>
            <div class="subtle" id="resultsSubtle">Loading…</div>
          </div>
          <div class="match-list" id="resultsPanel"></div>
        </section>

        <section class="panel card" id="tablePanelCard" hidden>
          <div class="panel-head">
            <h3>League table</h3>
            <div class="subtle" id="tableSubtle">Loading…</div>
          </div>
          <div class="table-wrap" id="tablePanel"></div>
        </section>

        <section class="panel card" id="newsPanelCard" hidden>
          <div class="panel-head">
            <h3>Club news</h3>
            <div class="subtle" id="newsSubtle">Latest stories</div>
          </div>
          <div class="news-list" id="newsPanel"></div>
        </section>
      </section>
    </div>
  </div>

  <script>
    const AUTO_REFRESH_MS = 0;

    const TEAM_CONFIG = {
      tottenham: {
        key: "tottenham",
        name: "Tottenham Hotspur",
        shortName: "Spurs",
        teamId: 73,
        leagueName: "Premier League",
        colours: { primary: "#111d45", secondary: "#0a1430", accent: "#ffffff", accent2: "#b9cae7" }
      },
      wimbledon: {
        key: "wimbledon",
        name: "AFC Wimbledon",
        shortName: "Wimbledon",
        teamId: 1044,
        leagueName: "League One",
        colours: { primary: "#0054b8", secondary: "#003378", accent: "#ffd447", accent2: "#ffe483" }
      }
    };

    const STORAGE_KEYS = {
      team: "football-dashboard-team",
      panel: "football-dashboard-panel"
    };

    let activeTeamKey = localStorage.getItem(STORAGE_KEYS.team) || "tottenham";
    let activePanelId = localStorage.getItem(STORAGE_KEYS.panel) || "fixturesPanelCard";
    let autoRefreshTimer = null;
    let latestSnapshot = null;

    const els = {
      teamToggle: document.getElementById("teamToggle"),
      menuButton: document.getElementById("menuButton"),
      menuPanel: document.getElementById("menuPanel"),
      updatedLabel: document.getElementById("updatedLabel"),
      brandSubtitle: document.getElementById("brandSubtitle"),
      brandLogo: document.getElementById("brandLogo"),
      brandFallback: document.getElementById("brandFallback"),
      heroEyebrow: document.getElementById("heroEyebrow"),
      heroMatch: document.getElementById("heroMatch"),
      heroSubdetail: document.getElementById("heroSubdetail"),
      heroArt: document.getElementById("heroArt"),
      statPosition: document.getElementById("statPosition"),
      statPositionSub: document.getElementById("statPositionSub"),
      statPoints: document.getElementById("statPoints"),
      statPointsSub: document.getElementById("statPointsSub"),
      fixturesSubtle: document.getElementById("fixturesSubtle"),
      resultsSubtle: document.getElementById("resultsSubtle"),
      tableSubtle: document.getElementById("tableSubtle"),
      fixturesPanel: document.getElementById("fixturesPanel"),
      resultsPanel: document.getElementById("resultsPanel"),
      tablePanel: document.getElementById("tablePanel"),
      newsPanel: document.getElementById("newsPanel"),
      newsSubtle: document.getElementById("newsSubtle")
    };

    function applyTheme() {
      const team = TEAM_CONFIG[activeTeamKey];
      document.documentElement.style.setProperty("--team-primary", team.colours.primary);
      document.documentElement.style.setProperty("--team-secondary", team.colours.secondary);
      document.documentElement.style.setProperty("--team-accent", team.colours.accent);
      document.documentElement.style.setProperty("--team-accent-2", team.colours.accent2);
      els.brandSubtitle.textContent = `${team.name} · ${team.leagueName}`;
      els.brandFallback.textContent = team.shortName.slice(0, 2).toUpperCase();
    }

    function renderTeamButtons() {
      els.teamToggle.innerHTML = Object.values(TEAM_CONFIG).map(team => `
        <button class="team-option ${team.key === activeTeamKey ? "active" : ""}" data-team="${team.key}">
          <strong>${escapeHtml(team.name)}</strong>
          <span>${escapeHtml(team.leagueName)}</span>
        </button>
      `).join("");

      els.teamToggle.querySelectorAll(".team-option").forEach(button => {
        button.addEventListener("click", async () => {
          const nextTeam = button.dataset.team;
          if (!nextTeam || nextTeam === activeTeamKey) {
            closeMenu();
            return;
          }
          activeTeamKey = nextTeam;
          localStorage.setItem(STORAGE_KEYS.team, activeTeamKey);
          applyTheme();
          renderTeamButtons();
          closeMenu();
          await loadDashboard({ initial: false });
        });
      });
    }

    function openMenu() {
      els.menuPanel.classList.add("open");
      els.menuButton.setAttribute("aria-expanded", "true");
    }

    function closeMenu() {
      els.menuPanel.classList.remove("open");
      els.menuButton.setAttribute("aria-expanded", "false");
    }

    function setupNav() {
      document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.addEventListener("click", () => setActivePanel(btn.dataset.panel));
      });
      setActivePanel(activePanelId);
    }

    function setActivePanel(panelId) {
      activePanelId = panelId;
      localStorage.setItem(STORAGE_KEYS.panel, activePanelId);

      document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.panel === activePanelId);
      });

      document.querySelectorAll(".panel.card").forEach(panel => {
        panel.hidden = panel.id !== activePanelId;
      });
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        let detail = "";
        try {
          const data = await response.json();
          detail = data?.error || JSON.stringify(data);
        } catch {}
        throw new Error(`Request failed for ${url}${detail ? `: ${detail}` : ""}`);
      }
      return response.json();
    }

    async function loadDashboard({ initial = false } = {}) {
      const team = TEAM_CONFIG[activeTeamKey];
      els.updatedLabel.textContent = initial ? "Loading…" : "Updating…";

      const [teamDataResult, liveDataResult, newsDataResult] = await Promise.allSettled([
        fetchJson(`/api/football/team?team=${team.key}`),
        fetchJson(`/api/football/live?team=${team.teamId}&season=2025`),
        fetchJson(`/api/news/bbc-football?team=${team.key}`)
      ]);

      const teamData = teamDataResult.status === "fulfilled" ? teamDataResult.value : latestSnapshot?.teamData;
      const liveData = liveDataResult.status === "fulfilled" ? liveDataResult.value : latestSnapshot?.liveData || {};
      const newsData = newsDataResult.status === "fulfilled" ? newsDataResult.value : latestSnapshot?.newsData || {};

      if (!teamData) {
        els.updatedLabel.textContent = "Update failed";
        return;
      }

      latestSnapshot = { teamData, liveData, newsData };

      try {
        renderBrand(teamData, team);
        renderHero(teamData, liveData, team);
        renderStats(teamData, team);
        renderFixtures(teamData, team);
        renderResults(teamData, team);
        renderTable(teamData, team);
        renderNews(teamData, newsData, team);
        els.updatedLabel.textContent = `Updated ${new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })}`;
      } catch (error) {
        console.error(error);
        els.updatedLabel.textContent = "Update failed";
      }
    }

    function renderBrand(data, team) {
      const crest =
        data?.team?.crest ||
        data?.team?.logo ||
        data?.crest ||
        data?.standings?.find?.(r => String(r?.team?.id || r?.id || "") === String(team.teamId))?.team?.crest ||
        "";

      if (crest) {
        els.brandLogo.src = crest;
        els.brandLogo.hidden = false;
        els.brandFallback.hidden = true;
      } else {
        els.brandLogo.hidden = true;
        els.brandFallback.hidden = false;
      }
    }

    function getDateValue(item) {
      const raw = item?.utcDate || item?.date || item?.fixture?.date || item?.kickoff || item?.kickOff || null;
      if (!raw) return null;
      const d = new Date(raw);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function isLiveMatchStatus(status) {
      const s = String(status || "").toUpperCase();
      return ["IN_PLAY", "LIVE", "PAUSED", "1H", "HT", "2H", "ET", "P"].includes(s);
    }

    function pickHeroFixture(data, liveData, team) {
      if (liveData?.live && liveData?.fixture) {
        return {
          mode: "live",
          competition: liveData.fixture?.league?.name || team.leagueName,
          date: liveData.fixture?.fixture?.date || null,
          homeName: liveData.fixture?.teams?.home?.name || "Home",
          awayName: liveData.fixture?.teams?.away?.name || "Away",
          homeScore: liveData.fixture?.goals?.home,
          awayScore: liveData.fixture?.goals?.away,
          homeCrest: liveData.fixture?.teams?.home?.logo || "",
          awayCrest: liveData.fixture?.teams?.away?.logo || "",
          statusText: liveData.fixture?.fixture?.status?.long || "LIVE",
          venue: liveData.fixture?.fixture?.venue?.name || ""
        };
      }

      const nextMatches = Array.isArray(data?.next) ? data.next : [];
      const liveMatches = nextMatches.filter(match => isLiveMatchStatus(match?.status));

      if (liveMatches.length) {
        const live = liveMatches[0];
        return {
          mode: "live",
          competition: live?.competition?.name || team.leagueName,
          date: live?.utcDate || live?.date || null,
          homeName: live?.homeTeam?.name || "Home",
          awayName: live?.awayTeam?.name || "Away",
          homeScore: live?.score?.fullTime?.home ?? live?.score?.home ?? null,
          awayScore: live?.score?.fullTime?.away ?? live?.score?.away ?? null,
          homeCrest: live?.homeTeam?.crest || "",
          awayCrest: live?.awayTeam?.crest || "",
          statusText: live?.status || "LIVE",
          venue: live?.venue || ""
        };
      }

      const upcoming = nextMatches
        .map(match => ({ ...match, _dateValue: getDateValue(match) }))
        .filter(match => match._dateValue && match._dateValue.getTime() >= Date.now())
        .sort((a, b) => a._dateValue - b._dateValue)[0];

      if (upcoming) {
        return {
          mode: "next",
          competition: upcoming?.competition?.name || team.leagueName,
          date: upcoming?.utcDate || upcoming?.date || null,
          homeName: upcoming?.homeTeam?.name || "Home",
          awayName: upcoming?.awayTeam?.name || "Away",
          homeScore: null,
          awayScore: null,
          homeCrest: upcoming?.homeTeam?.crest || "",
          awayCrest: upcoming?.awayTeam?.crest || "",
          statusText: "",
          venue: upcoming?.venue || ""
        };
      }

      const last = Array.isArray(data?.last) ? data.last[0] : null;
      if (last) {
        return {
          mode: "result",
          competition: last?.competition?.name || team.leagueName,
          date: last?.utcDate || last?.date || null,
          homeName: last?.homeTeam?.name || "Home",
          awayName: last?.awayTeam?.name || "Away",
          homeScore: last?.score?.fullTime?.home ?? last?.score?.home ?? null,
          awayScore: last?.score?.fullTime?.away ?? last?.score?.away ?? null,
          homeCrest: last?.homeTeam?.crest || "",
          awayCrest: last?.awayTeam?.crest || "",
          statusText: "FT",
          venue: last?.venue || ""
        };
      }

      return null;
    }

    function renderHero(data, liveData, team) {
      const fixture = pickHeroFixture(data, liveData, team);

      if (!fixture) {
        els.heroEyebrow.textContent = team.leagueName;
        els.heroMatch.innerHTML = `<div class="empty">No match data available</div>`;
        els.heroSubdetail.textContent = "";
        return;
      }

      const date = fixture.date ? new Date(fixture.date) : null;
      const dateLabel = date ? date.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" }) : "Date TBC";
      els.heroEyebrow.textContent = `${dateLabel} · ${fixture.competition || team.leagueName}`;

      const middleMarkup = fixture.mode === "live" || fixture.mode === "result"
        ? `<div class="hero-core"><span class="hero-score-big">${safeScore(fixture.homeScore)}</span><span class="hero-score-divider"></span><span class="hero-score-big">${safeScore(fixture.awayScore)}</span></div>`
        : `<div class="hero-core"><span class="hero-kickoff-time">${date ? date.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }) : "TBC"}</span></div>`;

      els.heroMatch.innerHTML = `
        <div class="hero-side home">
          <div class="hero-team">${escapeHtml(fixture.homeName)}</div>
          <div class="hero-crest-wrap">${renderCrest(fixture.homeCrest, fixture.homeName)}</div>
        </div>
        <div class="hero-middle">
          ${middleMarkup}
          <div class="hero-status">${escapeHtml(fixture.mode === "next" ? "" : fixture.statusText || "")}</div>
        </div>
        <div class="hero-side away">
          <div class="hero-crest-wrap">${renderCrest(fixture.awayCrest, fixture.awayName)}</div>
          <div class="hero-team">${escapeHtml(fixture.awayName)}</div>
        </div>
      `;

      if (fixture.mode === "next" && date) {
        els.heroSubdetail.textContent = `${relativeFromNow(date)}${fixture.venue ? ` · Venue: ${fixture.venue}` : ""}`;
      } else {
        els.heroSubdetail.textContent = fixture.venue ? `Venue: ${fixture.venue}` : "";
      }

      const art = fixture.awayCrest || fixture.homeCrest || "";
      els.heroArt.style.setProperty("--hero-art", art ? `url("${escapeHtml(art)}")` : "none");
    }

    function renderStats(data, team) {
      const stats = data?.stats || {};
      const standings = Array.isArray(data?.standings) ? data.standings : [];
      const row = standings.find(r => String(r?.team?.id || r?.id || "") === String(team.teamId));

      const position = stats.position ?? row?.position ?? row?.rank ?? null;
      const points = stats.points ?? row?.points ?? null;
      const played = stats.played ?? row?.playedGames ?? row?.all?.played ?? null;

      els.statPosition.textContent = position ? ordinal(position) : "–";
      els.statPositionSub.textContent = position ? `Current ${team.leagueName} position` : "League position unavailable";
      els.statPoints.textContent = points ?? "–";
      els.statPointsSub.textContent = played ? `${played} played` : "Points unavailable";
    }

    function renderFixtures(data, team) {
      const fixtures = Array.isArray(data?.next) ? data.next : [];
      els.fixturesSubtle.textContent = `${fixtures.length} upcoming`;

      if (!fixtures.length) {
        els.fixturesPanel.innerHTML = `<div class="empty">No fixtures returned.</div>`;
        return;
      }

      els.fixturesPanel.innerHTML = fixtures.slice(0, 8).map(match => renderMatchCard(match, "fixture", team)).join("");
    }

    function getHighlightsLink(match) {
      const competition = match?.competition?.name || "";
      const home = match?.homeTeam?.name || "";
      const away = match?.awayTeam?.name || "";
      const query = `${competition} ${home} ${away} highlights`;
      return `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
    }

    function renderResults(data, team) {
      const results = Array.isArray(data?.last) ? data.last : [];
      els.resultsSubtle.textContent = `${results.length} recent`;

      if (!results.length) {
        els.resultsPanel.innerHTML = `<div class="empty">No recent results returned.</div>`;
        return;
      }

      els.resultsPanel.innerHTML = results.slice(0, 8).map(match => renderMatchCard(match, "result", team)).join("");
    }

    function renderMatchCard(match, mode, team) {
      const date = match?.utcDate || match?.date ? new Date(match?.utcDate || match?.date) : null;
      const competition = match?.competition?.name || team.leagueName;
      const home = match?.homeTeam?.name || "Home";
      const away = match?.awayTeam?.name || "Away";
      const homeScore = match?.score?.fullTime?.home ?? match?.score?.home ?? "–";
      const awayScore = match?.score?.fullTime?.away ?? match?.score?.away ?? "–";
      const statusClass = mode === "result" ? "status-finished" : "status-upcoming";

      return `
        <article class="match-item">
          <div class="date-box">
            <strong>${date ? date.getDate() : "–"}</strong>
            ${date ? date.toLocaleString("en-GB", { month: "short" }) : "TBC"}
          </div>
          <div class="match-main">
            <div class="match-competition">${escapeHtml(competition)}</div>
            <div class="teams">
              <div class="team-line">
                <span class="team-name">${escapeHtml(home)}</span>
                <span class="team-score">${mode === "result" ? safeScore(homeScore) : "–"}</span>
              </div>
              <div class="team-line">
                <span class="team-name">${escapeHtml(away)}</span>
                <span class="team-score">${mode === "result" ? safeScore(awayScore) : "–"}</span>
              </div>
            </div>
            <div class="match-side">
              <div class="status-pill ${statusClass}">${escapeHtml(mode === "result" ? "FT" : "Scheduled")}</div>
              <div>${date ? date.toLocaleString("en-GB", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }) : "Date TBC"}</div>
            </div>
            ${mode === "result" ? `<a class="result-link" href="${getHighlightsLink(match)}" target="_blank" rel="noreferrer">Play highlights</a>` : ""}
          </div>
        </article>
      `;
    }

    function renderTable(data, team) {
      const standings = Array.isArray(data?.standings) ? data.standings : [];
      els.tableSubtle.textContent = team.leagueName;

      if (!standings.length) {
        els.tablePanel.innerHTML = `<div class="empty">No table data returned.</div>`;
        return;
      }

      els.tablePanel.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th>Team</th>
              <th>P</th>
              <th>Pts</th>
            </tr>
          </thead>
          <tbody>
            ${standings.map(row => {
              const isActive = String(row?.team?.id || row?.id || "") === String(team.teamId);
              const crest = row?.team?.crest || row?.team?.logo || row?.logo || row?.teamLogo || "";
              const teamName = row?.team?.name || row?.teamName || "Team";
              const played = row?.playedGames ?? row?.all?.played ?? row?.played ?? "–";
              const points = row?.points ?? "–";
              const pos = row?.position ?? row?.rank ?? "–";
              return `
                <tr class="${isActive ? "active-row" : ""}">
                  <td>${pos}</td>
                  <td>
                    <div class="team-cell">
                      ${crest ? `<img class="team-logo" src="${escapeHtml(crest)}" alt="" loading="lazy" />` : `<div class="team-logo"></div>`}
                      <span>${escapeHtml(teamName)}</span>
                    </div>
                  </td>
                  <td>${played}</td>
                  <td>${points}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function renderNews(data, newsResponse, team) {
      const endpointNews = Array.isArray(data?.news) ? data.news : [];
      const rssNews = Array.isArray(newsResponse?.items) ? newsResponse.items : [];
      const baseItems = endpointNews.length ? endpointNews : rssNews;

      const filters = team.key === "wimbledon"
        ? ["afc wimbledon", "wimbledon", "dons", "plough lane"]
        : ["tottenham", "spurs", "tottenham hotspur"];

      const filtered = baseItems.filter(item => {
        const text = `${item?.title || ""} ${item?.description || ""}`.toLowerCase();
        return filters.some(term => text.includes(term));
      });

      const items = filtered.length ? filtered : baseItems.slice(0, 8);
      els.newsSubtle.textContent = team.key === "wimbledon" ? "Latest club news" : "Latest stories";

      if (!items.length) {
        els.newsPanel.innerHTML = `<div class="empty">No news returned.</div>`;
        return;
      }

      els.newsPanel.innerHTML = items.slice(0, 8).map(item => {
        const image = item?.thumbnail || item?.image || item?.enclosure?.url || item?.imageUrl || "";
        const title = item?.title || "Untitled story";
        const link = item?.link || "#";
        const description = item?.description || "";
        const pubDate = item?.pubDate || "";
        return `
          <article class="news-item">
            <div class="news-inner">
              ${image ? `<img class="news-thumb" src="${escapeHtml(image)}" alt="" loading="lazy" />` : `<div class="news-thumb"></div>`}
              <div class="news-content">
                <div class="news-title">
                  <a href="${escapeHtml(link)}" target="_blank" rel="noreferrer">${escapeHtml(title)}</a>
                </div>
                <div class="news-meta">
                  ${escapeHtml(pubDate ? formatPubDate(pubDate) : "No date")} ·
                  ${escapeHtml(trimText(description, 160))}
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderCrest(src, teamName) {
      if (src) return `<img src="${escapeHtml(src)}" alt="${escapeHtml(teamName)} crest" loading="lazy" />`;
      const initials = String(teamName || "?").split(/\s+/).map(p => p[0] || "").join("").slice(0, 3).toUpperCase();
      return `<div class="hero-crest-fallback">${escapeHtml(initials)}</div>`;
    }

    function safeScore(value) { return value === null || value === undefined ? "–" : String(value); }

    function ordinal(n) {
      const num = Number(n);
      if (!num) return "–";
      const s = ["th", "st", "nd", "rd"];
      const v = num % 100;
      return `${num}${s[(v - 20) % 10] || s[v] || s[0]}`;
    }

    function relativeFromNow(date) {
      const diff = date.getTime() - Date.now();
      const mins = Math.round(Math.abs(diff) / 60000);
      const hours = Math.round(Math.abs(diff) / 3600000);
      const days = Math.round(Math.abs(diff) / 86400000);
      if (mins < 60) return diff >= 0 ? `in ${mins}m` : `${mins}m ago`;
      if (hours < 48) return diff >= 0 ? `in ${hours}h` : `${hours}h ago`;
      return diff >= 0 ? `in ${days}d` : `${days}d ago`;
    }

    function formatPubDate(dateString) {
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleString("en-GB", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
    }

    function trimText(text, max) {
      if (!text || text.length <= max) return text;
      return `${text.slice(0, max).trim()}…`;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    els.menuButton.addEventListener("click", () => {
      if (els.menuPanel.classList.contains("open")) closeMenu();
      else openMenu();
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".menu-wrap")) closeMenu();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeMenu();
    });

    function startAutoRefresh() {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }

    applyTheme();
    renderTeamButtons();
    setupNav();
    loadDashboard({ initial: true });
    startAutoRefresh();
  </script>
</body>
</html>
